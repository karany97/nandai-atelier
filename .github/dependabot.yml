# Dependabot config — auto-generated 2026-05-18
# Schedule: weekly, Monday 06:00 UTC
# Groups patch + minor updates together; max 5 PRs per ecosystem
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    groups:
      npm-patch-minor:
        update-types:
          - "patch"
          - "minor"
